<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Scan Product | Smart Retail Shopping</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2e7d32', secondary: '#ef6c00', surface: '#fbfaf8' },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #reader { width: 100%; max-width: 320px; margin: 0 auto; border-radius: 1rem; overflow: hidden; }
        /* Smooth card pop-in */
        .product-card { transform: scale(0); opacity: 0; display: none; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease; }
        .product-card.show { transform: scale(1); opacity: 1; }
    </style>
</head>
<body class="bg-surface font-sans min-h-screen flex flex-col">

<!-- Top Nav -->
<nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
        <button onclick="window.history.back()" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600 transition-colors">
            <span class="material-symbols-outlined text-xl">arrow_back</span>
        </button>
        <span class="font-bold text-primary">Scan Product QR</span>
        <a href="{{ url_for('cart') }}" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600 transition-colors">
            <span class="material-symbols-outlined text-xl">shopping_basket</span>
        </a>
    </div>
</nav>

<div class="flex-1 flex flex-col items-center justify-start px-4 py-6 max-w-md mx-auto w-full">

    <!-- Header -->
    <div class="text-center mb-5">
        <div class="w-14 h-14 bg-green-100 text-primary rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm">
            <span class="material-symbols-outlined text-3xl">qr_code_scanner</span>
        </div>
        <h1 class="text-lg font-bold text-gray-900">Point at the QR code</h1>
        <p class="text-sm text-gray-500 mt-1">Hold the camera steady to scan village mart products</p>
    </div>

    <!-- Scanner -->
    <div id="scanner-wrapper" class="w-full">
        <div id="reader" class="shadow-xl border-2 border-gray-200 rounded-2xl overflow-hidden bg-white"></div>
    </div>

    <!-- Status -->
    <p id="scan-status" class="text-sm text-gray-400 mt-4 text-center"></p>

    <!-- Product Card (hidden until scanned) -->
    <div id="productCard" class="product-card w-full bg-white rounded-2xl shadow-xl border border-gray-100 mt-6 overflow-hidden">
        <div class="bg-gradient-to-r from-primary to-green-700 px-5 py-3 flex items-center gap-2">
            <span class="material-symbols-outlined text-white text-base">verified</span>
            <span class="text-white text-xs font-bold uppercase tracking-widest">Verified Village Product</span>
        </div>
        <div class="p-5">
            <h2 id="p-name" class="text-xl font-bold text-gray-900 mb-1"></h2>
            <p id="p-price" class="text-2xl font-black text-primary mb-3"></p>
            <div class="space-y-1.5 mb-5">
                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <span class="material-symbols-outlined text-base text-gray-400">scale</span>
                    <span id="p-size">—</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <span class="material-symbols-outlined text-base text-gray-400">storefront</span>
                    <span id="p-store">—</span>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="addToCart()" class="flex-1 py-3 bg-primary hover:bg-green-800 text-white font-bold rounded-xl transition-colors flex items-center justify-center gap-2 text-sm">
                    <span class="material-symbols-outlined text-base">add_shopping_cart</span> Add to Cart
                </button>
                <button onclick="resetScan()" class="py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors text-sm">
                    Rescan
                </button>
            </div>
        </div>
    </div>

    <!-- Reset button (shows when scanning) -->
    <button id="resetBtn" onclick="resetScan()" class="mt-5 px-6 py-2.5 border border-gray-300 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-100 transition-colors hidden">
        ↺ Reset Scanner
    </button>

</div>

<script>
let scanned = false;
let currentProductId = null;
let currentStoreId = null;
let html5QrCode;

async function onScanSuccess(decodedText) {
    if (scanned) return;
    scanned = true;

    document.getElementById('scan-status').textContent = 'Product found! Loading details...';
    document.getElementById('scanner-wrapper').style.display = 'none';
    document.getElementById('resetBtn').classList.remove('hidden');

    let productId = decodedText;
    try { const j = JSON.parse(decodedText); if (j.id) productId = j.id; } catch(e) {}

    try {
        const res = await fetch('/api/products/' + encodeURIComponent(productId));
        const product = await res.json();

        if (product && !product.error) {
            document.getElementById('p-name').textContent = product.name || 'Unknown Product';
            document.getElementById('p-price').textContent = '₹' + (product.price || '0');
            document.getElementById('p-size').textContent = product.size || 'N/A';
            document.getElementById('p-store').textContent = product.store_name || 'Smart Retail Shopping';
            currentProductId = productId;
            currentStoreId = product.store_id;

            const card = document.getElementById('productCard');
            card.style.display = 'block';
            requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('show')));

            document.getElementById('scan-status').textContent = '';
            if (navigator.vibrate) navigator.vibrate(80);
        } else {
            document.getElementById('scan-status').textContent = 'Product not found for ID: ' + productId;
        }
    } catch(err) {
        document.getElementById('scan-status').textContent = 'Failed to fetch product.';
    }
}

function startScanner() {
    html5QrCode = new Html5Qrcode('reader');
    Html5Qrcode.getCameras().then(devices => {
        if (!devices || !devices.length) { alert('No camera found.'); return; }
        let camId = devices[0].id;
        for (const d of devices) { if (d.label.toLowerCase().includes('back')) { camId = d.id; break; } }
        html5QrCode.start(camId, { fps: 10, qrbox: { width: 230, height: 230 } }, onScanSuccess, () => {})
            .catch(err => { console.error(err); alert('Camera access denied. Check browser permissions.'); });
    }).catch(err => console.error('Camera enum error:', err));
}

function resetScan() {
    scanned = false; currentProductId = null; currentStoreId = null;
    const card = document.getElementById('productCard');
    card.classList.remove('show');
    setTimeout(() => { card.style.display = 'none'; }, 350);
    document.getElementById('scanner-wrapper').style.display = 'block';
    document.getElementById('resetBtn').classList.add('hidden');
    document.getElementById('scan-status').textContent = '';
    startScanner();
}

async function addToCart() {
    if (!currentProductId) return;
    try {
        const res = await fetch('/api/cart', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id: currentProductId, store_id: currentStoreId, quantity: 1 })
        });
        const result = await res.json();
        if (result.success) {
            const btn = document.querySelector('#productCard button');
            btn.innerHTML = '<span class="material-symbols-outlined text-base">check_circle</span> Added!';
            btn.classList.replace('bg-primary', 'bg-green-600');
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined text-base">add_shopping_cart</span> Add to Cart';
                btn.classList.replace('bg-green-600', 'bg-primary');
            }, 2000);
        } else { alert(result.error || 'Login as customer to add to cart.'); }
    } catch(e) { alert('Failed to add to cart.'); }
}

window.addEventListener('load', startScanner);
</script>
</body>
</html>
